<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Header CSS Debug</title>
<style>
body{font-family:monospace;padding:20px;background:#f0f0f0}
#log{background:#1e1e1e;color:#0f0;padding:15px;border-radius:8px;white-space:pre-wrap;font-size:11px;max-height:500px;overflow:auto;margin-bottom:10px}
#render{background:white;border-radius:8px;overflow:auto;margin-bottom:10px}
button{padding:8px 16px;background:#2d6a4f;color:white;border:none;border-radius:6px;cursor:pointer;margin:3px}
input{padding:6px;border:1px solid #ccc;border-radius:4px;width:60px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<h2>Header CSS Debug</h2>
<p>Sub ID: <input id="sid" value="22"> <button onclick="run()">Run</button></p>
<div id="log">Press Run...</div>
<div id="render"></div>
<script>
var L=function(m){var el=document.getElementById('log');el.textContent+=m+'\n';el.scrollTop=el.scrollHeight;};
function loadScript(src){
    return new Promise(function(res,rej){
        var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
}
async function run(){
    document.getElementById('log').textContent='';
    document.getElementById('render').innerHTML='';
    var SID=document.getElementById('sid').value;

    var r=await fetch('/org-dashboard/php/get_docx.php?id='+SID+'&mode=binary',{credentials:'include'});
    var buf=await r.arrayBuffer();
    if(typeof docx==='undefined') await loadScript('https://cdn.jsdelivr.net/npm/docx-preview@0.3.2/dist/docx-preview.min.js');
    var c=document.getElementById('render');
    await docx.renderAsync(buf,c,null,{
        className:'docx-wrapper',inWrapper:true,
        renderHeaders:true,renderFooters:true,
        useBase64URL:true,experimental:true
    });
    L('Rendered');

    // Get header and log every element's computed style
    var header = c.querySelector('header');
    if(!header){L('NO HEADER FOUND'); return;}
    L('Header offsetH='+header.offsetHeight+' scrollH='+header.scrollHeight);
    L('Header computed: position='+getComputedStyle(header).position+' overflow='+getComputedStyle(header).overflow);
    L('');
    L('=== ALL ELEMENTS IN HEADER (with computed styles) ===');
    header.querySelectorAll('*').forEach(function(el,i){
        var cs = getComputedStyle(el);
        var pos = cs.position;
        var vis = cs.visibility;
        var disp = cs.display;
        var w = cs.width;
        var h = cs.height;
        var left = cs.left;
        var top = cs.top;
        // Only log interesting ones
        if(pos!=='static' || vis!=='visible' || disp==='none' || el.tagName==='IMG'){
            L(el.tagName+'.'+(el.className||'').substring(0,30));
            L('  pos='+pos+' left='+left+' top='+top+' w='+w+' h='+h);
            L('  vis='+vis+' display='+disp);
            if(el.tagName==='IMG') L('  naturalW='+el.naturalWidth+' src_type='+(el.src.startsWith('data:') ? 'data:len='+el.src.length : el.src.substring(0,40)));
        }
    });
}
</script>
</body></html>
